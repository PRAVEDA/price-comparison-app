[build]
  publish = "frontend/dist"
  command = "cd frontend && npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/_/backend/*"
  to = "http://localhost:5000/:splat"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
